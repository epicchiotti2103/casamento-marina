<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospedagem - Casamento Marina & Keyber</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Lato', sans-serif;
      background: #FBF4F7;
      color: #5F6347;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 3rem auto;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #7C8A4E;
      text-align: center;
      margin-bottom: 2rem;
    }
    ul {
      padding-left: 1.2rem;
      font-size: 1.1rem;
    }
    li {
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .voltar {
      display: block;
      margin: 2rem auto 0 auto;
      background: #7C8A4E;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      text-align: center;
      text-decoration: none;
      font-family: 'Lato', sans-serif;
      transition: background 0.3s;
      width: fit-content;
    }
    .voltar:hover {
      background: #C77E96;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Onde se hospedar</h1>
    <p style="text-align:center; font-size:1.1rem; line-height:1.6; margin-bottom:1.8rem;">
      Nossa indicação de hospedagem para o casamento é a<br>
      <strong style="font-size:1.25rem;">Pousada da Villa</strong> 💛
    </p>
    <a href="https://www.instagram.com/pousada.da.villa?igsh=NWhkeTdtcHN4OXIw"
       target="_blank" rel="noopener" class="voltar" style="background:#C77E96;">
      📷 Ver no Instagram
    </a>
    <a href="index.html" class="voltar">Voltar para o site</a>
  </div>
</body>
</html>
